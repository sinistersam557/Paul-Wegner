<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucket List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Iceberg&family=Odibee+Sans&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/b1d957f9c5.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="./assets/favicon.png">
</head>
<body>
    <div id="container">
        <h1>Bucket List</h1>
        <div class="inputContainer">
            <input type="text" placeholder="Enter New Bucket Item">
            <button type="submit">Submit</button>
        </div>
        <ul>
            <li>Read a Book <span><i class="fa-solid fa-trash-can"></i></span></li>
            <li>Travel to Another City <span><i class="fa-solid fa-trash-can"></i></span></li>
            <li>Run a Marathon <span><i class="fa-solid fa-trash-can"></i></span></li>
            <li>Compose a Song <span><i class="fa-solid fa-trash-can"></i></span></li>
            <li>Go Back to School <span><i class="fa-solid fa-trash-can"></i></span></li>
        </ul>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
