<div class="stock-container" routerLink="/stocks/{{ stock.code }}">
    <div class="name">{{ stock.name }}</div>
    <div class="code">{{ stock.code }}</div>
    <div class="exchange">{{ stock.exchange }}</div>
    <div class="price"
        [class.positive]="stock.price > stock.previousPrice"
        [class.negative]="stock.price <= stock.previousPrice"
    >
        $ {{ stock.price }}
    </div>
    <button 
        (click)="onToggleFavorite($event)"
        *ngIf="!stock.favorite"
    >
        Add to Favorites
    </button>
    <button 
        (click)="onToggleFavorite($event)"
        *ngIf="stock.favorite"
    >
        Remove from Favorites
    </button>
</div>
